<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Pong Game</h1>
        
        <div class="scoreboard">
            <div class="player-score">
                <h2>Player</h2>
                <p id="playerScore">0</p>
            </div>
            <div class="score-divider">VS</div>
            <div class="computer-score">
                <h2>Computer</h2>
                <p id="computerScore">0</p>
            </div>
        </div>

        <canvas id="pongCanvas" width="800" height="400"></canvas>

        <div class="controls">
            <p>Controls:</p>
            <ul>
                <li><strong>Mouse:</strong> Move mouse up/down to control paddle</li>
                <li><strong>Arrow Keys:</strong> Up/Down to control paddle</li>
                <li><strong>Space:</strong> Start/Pause game</li>
            </ul>
        </div>

        <button id="startBtn" class="btn">Start Game</button>
        <button id="resetBtn" class="btn">Reset Game</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
